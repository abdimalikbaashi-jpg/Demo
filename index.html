<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color: white;
    text-align: center;
}

.container {
    max-width: 520px;
    margin: auto;
    padding: 25px;
}

.logo {
    width: 120px;
    border-radius: 20px;
    margin-top: 20px;
}

h1 {
    color: #00ff99;
    margin: 15px 0;
}

.tag {
    color: #aaa;
    font-size: 14px;
}

.card {
    background: #222;
    padding: 15px;
    border-radius: 12px;
    margin-top: 20px;
}

.download-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 25px;
    background: #00ff99;
    color: black;
    font-weight: bold;
    text-decoration: none;
    border-radius: 10px;
    font-size: 16px;
}

.download-btn:hover {
    background: #00cc77;
}

.countdown {
    margin-top: 10px;
    color: #ffcc00;
    font-size: 14px;
}

.screens {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 15px;
}

.screens div {
    width: 100px;
    height: 180px;
    background: #333;
    border-radius: 10px;
}

.footer {
    margin-top: 25px;
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="https://i.ibb.co/JRmXR7kv/file-000000006fdc71f4b990d05b6036a35a.png" class="logo">

    <h1>SHACAB ANIME </h1>
    <p class="tag">Fast • Secure • Lightweight APK</p>

    <!-- INFO CARD -->
    <div class="card">
        <p><b>Version:</b> 1.0.0</p>
        <p><b>Size:</b> 32 MB</p>
        <p><b>Android:</b> 5.0+</p>

        <div class="countdown" id="countdown">
            Preparing download... 5
        </div>

        <a id="downloadBtn" class="download-btn" href="https://drive.google.com/file/d/1pyOTdTDlYXI3GsuXKFR8ZiFeFYJ-hQPg/view?usp=drivesdk style="display:none;">
            ⬇ Download APK
        </a>
    </div>

    <!-- SCREENSHOTS -->
<div class="card">
    <h3>Screenshots</h3>

    <div class="screenshots">
        <img src="https://i.ibb.co/7dc9cvJW/IMG-20260627-213917.jpg" alt="screen1">
        <img src="https://i.ibb.co/FLCf6Xz8/IMG-20260627-213928.jpg" alt="screen2">
        <img src="https://i.ibb.co/Gv44nVTc/IMG-20260627-213938.jpg" alt="screen3">
    </div>
</div>

    <div class="footer">
        © 2026 SHACAB ANIME  | Safe Download Page
    </div>

</div>

<script>
let time = 5;
let countdown = document.getElementById("countdown");
let btn = document.getElementById("downloadBtn");

let x = setInterval(() => {
    time--;
    countdown.innerHTML = "Preparing download... " + time;

    if(time <= 0){
        clearInterval(x);
        countdown.style.display = "none";
        btn.style.display = "inline-block";
    }
}, 1000);
</script>

</body>
</html>
